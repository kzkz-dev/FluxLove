<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Interactive Flowers Reel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #080510;
      color: #fff;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at top, rgba(130, 80, 255, 0.18), transparent 35%),
        linear-gradient(180deg, #120a22 0%, #090611 50%, #05030a 100%);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 120, 220, 0.08), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: 0.18;
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 16px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      z-index: 20;
    }

    .chip {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 13px;
      font-weight: 600;
      color: #f1e8ff;
    }

    .hero {
      position: absolute;
      top: 90px;
      left: 18px;
      right: 18px;
      text-align: center;
      z-index: 10;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 0.95;
      font-weight: 800;
      color: #ffc8ea;
      text-shadow: 0 0 14px rgba(255, 140, 220, 0.18);
    }

    .hero p {
      margin-top: 16px;
      font-size: 16px;
      color: #d7c8ef;
    }

    .code-card {
      position: absolute;
      width: 150px;
      padding: 12px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      z-index: 8;
    }

    .card1 {
      top: 250px;
      left: 16px;
      transform: rotate(-8deg);
    }

    .card2 {
      top: 325px;
      right: 16px;
      transform: rotate(8deg);
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
    }

    .line {
      height: 8px;
      border-radius: 999px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.45);
    }

    .w1 { width: 95%; }
    .w2 { width: 72%; }
    .w3 { width: 85%; }
    .w4 { width: 58%; }

    .flower-area {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 145px;
      height: 330px;
      z-index: 5;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      bottom: 0;
      width: 88px;
      height: 200px;
      transform-origin: bottom center;
      animation: sway 3.8s ease-in-out infinite;
    }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8px;
      height: 120px;
      transform: translateX(-50%);
      border-radius: 20px;
      background: linear-gradient(180deg, #75f5a9 0%, #38d77e 100%);
      box-shadow: 0 0 8px rgba(70, 255, 160, 0.25);
    }

    .leaf {
      position: absolute;
      width: 24px;
      height: 14px;
      background: #4be18d;
      border-radius: 20px 0 20px 0;
      opacity: 0.95;
    }

    .leaf.left {
      left: 20px;
      bottom: 48px;
      transform: rotate(-35deg);
    }

    .leaf.right {
      right: 20px;
      bottom: 72px;
      transform: scaleX(-1) rotate(-35deg);
    }

    .bloom {
      position: absolute;
      top: 0;
      left: 50%;
      width: 80px;
      height: 80px;
      transform: translateX(-50%);
    }

    .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 40px;
      margin-left: -13px;
      margin-top: -30px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 30%, #ff8bdd, #ff59c8 70%);
      box-shadow: 0 0 10px rgba(255, 90, 200, 0.18);
      transform-origin: center 24px;
    }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      margin-left: -9px;
      margin-top: -9px;
      border-radius: 50%;
      background: #ffc74d;
      box-shadow: 0 0 8px rgba(255, 200, 80, 0.25);
      z-index: 2;
    }

    .p1 { transform: translateY(-18px) rotate(0deg); }
    .p2 { transform: translateY(-18px) rotate(45deg); }
    .p3 { transform: translateY(-18px) rotate(90deg); }
    .p4 { transform: translateY(-18px) rotate(135deg); }
    .p5 { transform: translateY(-18px) rotate(180deg); }
    .p6 { transform: translateY(-18px) rotate(225deg); }
    .p7 { transform: translateY(-18px) rotate(270deg); }
    .p8 { transform: translateY(-18px) rotate(315deg); }

    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .tap-hint {
      position: absolute;
      left: 50%;
      bottom: 190px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: #eddcff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 12;
    }

    .right-rail {
      position: absolute;
      right: 10px;
      bottom: 175px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 20;
    }

    .rail-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff65cf, #8d5cff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .plus {
      position: absolute;
      bottom: -6px;
      right: -2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ff315a;
      border: 2px solid #0b0713;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
    }

    .rail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
    }

    .rail-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .caption {
      position: absolute;
      left: 14px;
      right: 78px;
      bottom: 24px;
      z-index: 20;
    }

    .userline {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .username {
      font-size: 15px;
      font-weight: 700;
    }

    .follow-btn {
      border: 1px solid rgba(255,255,255,0.35);
      background: transparent;
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .desc {
      font-size: 14px;
      line-height: 1.45;
      color: #f3ebff;
      margin-bottom: 8px;
    }

    .audio {
      font-size: 13px;
      color: #d8c7f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .burst {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      pointer-events: none;
      animation: burstUp 700ms ease-out forwards;
    }

    @keyframes burstUp {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.8);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.4);
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="grid"></div>

    <div class="topbar">
      <div class="chip">LIVE PREVIEW</div>
      <div class="chip">✨ Premium Motion</div>
    </div>

    <div class="hero">
      <h1>Interactive<br>Flowers</h1>
      <p>Tap anywhere to grow magical flowers</p>
    </div>

    <div class="code-card card1">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="line w1"></div>
      <div class="line w2"></div>
      <div class="line w3"></div>
      <div class="line w4"></div>
    </div>

    <div class="code-card card2">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="line w2"></div>
      <div class="line w1"></div>
      <div class="line w4"></div>
      <div class="line w3"></div>
    </div>

    <div class="flower-area" id="flowerArea"></div>
    <div class="tap-hint">Tap to create flowers 🌸</div>

    <div class="right-rail">
      <div class="rail-item" style="position:relative;">
        <div class="rail-avatar">✿</div>
        <div class="plus">+</div>
      </div>

      <div class="rail-item">
        <button class="rail-btn" id="likeBtn">❤</button>
        <span id="likeText">24.8K</span>
      </div>

      <div class="rail-item">
        <button class="rail-btn">💬</button>
        <span>1.2K</span>
      </div>

      <div class="rail-item">
        <button class="rail-btn">↗</button>
        <span>Share</span>
      </div>

      <div class="rail-item">
        <button class="rail-btn">🔖</button>
        <span>Save</span>
      </div>
    </div>

    <div class="caption">
      <div class="userline">
        <div class="username">@yourusername</div>
        <button class="follow-btn">Follow</button>
      </div>
      <div class="desc">
        Beautiful glowing flower animation with premium dark UI and interactive bloom effect.
      </div>
      <div class="audio">♪ Original Audio — Interactive Flowers Demo</div>
    </div>
  </div>

  <script>
    const app = document.getElementById("app");
    const flowerArea = document.getElementById("flowerArea");
    const likeBtn = document.getElementById("likeBtn");
    const likeText = document.getElementById("likeText");

    let liked = false;
    let likes = 24800;

    function formatLikes(n) {
      return n >= 1000 ? (n / 1000).toFixed(1).replace(".0","") + "K" : String(n);
    }

    likeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      liked = !liked;
      likes += liked ? 1 : -1;
      likeBtn.textContent = liked ? "💖" : "❤";
      likeText.textContent = formatLikes(likes);
      likeBtn.style.transform = "scale(1.08)";
      setTimeout(() => likeBtn.style.transform = "scale(1)", 120);
    });

    function flowerHTML() {
      return `
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="bloom">
          <div class="petal p1"></div>
          <div class="petal p2"></div>
          <div class="petal p3"></div>
          <div class="petal p4"></div>
          <div class="petal p5"></div>
          <div class="petal p6"></div>
          <div class="petal p7"></div>
          <div class="petal p8"></div>
          <div class="center"></div>
        </div>
      `;
    }

    function createFlower(percentX, scale = 1) {
      const flower = document.createElement("div");
      flower.className = "flower";
      flower.style.left = percentX + "%";
      flower.style.transform = `scale(${scale})`;
      flower.innerHTML = flowerHTML();
      flowerArea.appendChild(flower);

      const maxFlowers = 10;
      while (flowerArea.children.length > maxFlowers) {
        flowerArea.removeChild(flowerArea.children[0]);
      }
    }

    function burst(x, y) {
      for (let i = 0; i < 6; i++) {
        const b = document.createElement("div");
        b.className = "burst";
        b.style.left = x + "px";
        b.style.top = y + "px";
        b.style.setProperty("--x", `${(Math.random() - 0.5) * 60}px`);
        b.style.setProperty("--y", `${-20 - Math.random() * 50}px`);
        app.appendChild(b);
        setTimeout(() => b.remove(), 700);
      }
    }

    function addFlowerByTouch(clientX, clientY) {
      const rect = flowerArea.getBoundingClientRect();
      if (clientY < rect.top || clientY > rect.bottom) return;

      const x = ((clientX - rect.left) / rect.width) * 100;
      if (x < 5 || x > 95) return;

      createFlower(x - 10, 0.9 + Math.random() * 0.25);
      burst(clientX, clientY);
    }

    app.addEventListener("click", function (e) {
      addFlowerByTouch(e.clientX, e.clientY);
    });

    app.addEventListener("touchstart", function (e) {
      const t = e.touches[0];
      if (!t) return;
      addFlowerByTouch(t.clientX, t.clientY);
    }, { passive: true });

    createFlower(16, 0.95);
    createFlower(36, 1.05);
    createFlower(58, 0.92);
    createFlower(76, 1.02);
  </script>
</body>
</html>
