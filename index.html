<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Flowers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg1: #090712;
      --bg2: #140b24;
      --bg3: #22113a;
      --glass: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f2ff;
      --muted: #cdbff5;
      --pink: #ff5cc8;
      --pink2: #ff84dc;
      --violet: #8d5cff;
      --green: #54e38e;
      --green2: #27c76f;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(141, 92, 255, 0.24), transparent 25%),
        radial-gradient(circle at 80% 25%, rgba(255, 92, 200, 0.18), transparent 24%),
        radial-gradient(circle at 70% 80%, rgba(84, 227, 142, 0.12), transparent 22%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .blob.one {
      width: 240px;
      height: 240px;
      background: rgba(255, 92, 200, 0.28);
      top: 8%;
      left: 8%;
    }

    .blob.two {
      width: 280px;
      height: 280px;
      background: rgba(141, 92, 255, 0.24);
      top: 50%;
      right: 8%;
      animation-duration: 16s;
    }

    .blob.three {
      width: 220px;
      height: 220px;
      background: rgba(84, 227, 142, 0.18);
      bottom: 8%;
      left: 28%;
      animation-duration: 18s;
    }

    @keyframes drift {
      from { transform: translateY(-10px) translateX(-10px) scale(1); }
      to { transform: translateY(15px) translateX(12px) scale(1.08); }
    }

    .mouse-glow {
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255,255,255,0.18), rgba(255,255,255,0.03) 45%, transparent 70%);
      transform: translate(-50%, -50%);
      filter: blur(18px);
      mix-blend-mode: screen;
      z-index: 1;
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone {
      width: 390px;
      max-width: 100%;
      height: 780px;
      border-radius: 34px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        rgba(8, 8, 20, 0.6);
      backdrop-filter: blur(18px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 30px 80px rgba(0,0,0,0.55),
        0 0 70px rgba(141,92,255,0.14);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 18%);
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      position: absolute;
      top: 16px;
      left: 18px;
      right: 18px;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pill {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      font-size: 12px;
      color: #f6eaff;
      box-shadow: var(--shadow);
    }

    .title-box {
      position: absolute;
      top: 70px;
      left: 22px;
      right: 22px;
      z-index: 4;
      text-align: center;
      animation: fadeUp 1.2s ease;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.5px;
      line-height: 1.05;
      background: linear-gradient(90deg, #ffffff, #ffd4f3, #c8b2ff, #ffffff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 5s linear infinite;
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      opacity: 0.9;
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .grid-light {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: linear-gradient(180deg, transparent, rgba(0,0,0,1) 30%, rgba(0,0,0,1) 70%, transparent);
      opacity: 0.25;
    }

    .flower-field {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 118px;
      height: 420px;
      pointer-events: none;
    }

    .flower {
      position: absolute;
      bottom: 0;
      width: 86px;
      height: 240px;
      transform-origin: bottom center;
      animation: sway 4.8s ease-in-out infinite;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.28));
    }

    .flower .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8px;
      height: 0;
      border-radius: 999px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #71f3a9, #22995a);
      box-shadow: 0 0 14px rgba(84, 227, 142, 0.25);
      animation: growStem 1.5s ease forwards;
    }

    .flower .leaf {
      position: absolute;
      width: 28px;
      height: 16px;
      background: linear-gradient(135deg, #65eba0, #28b868);
      border-radius: 100% 0 100% 0;
      opacity: 0;
      animation: leafIn 0.8s ease forwards;
      box-shadow: 0 0 12px rgba(84, 227, 142, 0.18);
    }

    .flower .leaf.left {
      left: 18px;
      bottom: 72px;
      transform: rotate(-34deg);
      animation-delay: 0.8s;
    }

    .flower .leaf.right {
      right: 18px;
      bottom: 108px;
      transform: scaleX(-1) rotate(-32deg);
      animation-delay: 1s;
    }

    .flower .center {
      position: absolute;
      left: 50%;
      top: 18px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translateX(-50%) scale(0);
      background: radial-gradient(circle at 35% 35%, #ffe9a7, #ffbf47 70%, #ff9f1a 100%);
      box-shadow: 0 0 18px rgba(255, 185, 73, 0.45);
      animation: bloom 0.6s ease forwards;
      animation-delay: 1.15s;
      z-index: 3;
    }

    .flower .petal {
      position: absolute;
      left: 50%;
      top: 6px;
      width: 24px;
      height: 42px;
      border-radius: 50% 50% 48% 48%;
      transform-origin: center 30px;
      opacity: 0;
      background: radial-gradient(circle at 40% 30%, var(--pink2), var(--pink) 55%, #ce3794 100%);
      box-shadow:
        0 0 20px rgba(255, 92, 200, 0.22),
        inset 0 0 10px rgba(255,255,255,0.12);
      animation: petalIn 0.7s ease forwards;
      animation-delay: 1.1s;
    }

    .flower .spark {
      position: absolute;
      top: 26px;
      left: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 12px rgba(255,255,255,0.8);
      opacity: 0;
      animation: sparkle 2.6s ease-in-out infinite;
      animation-delay: 1.6s;
    }

    .flower .petal.p1 { transform: translateX(-50%) rotate(0deg) translateY(-16px) scale(0.2); }
    .flower .petal.p2 { transform: translateX(-50%) rotate(45deg) translateY(-16px) scale(0.2); }
    .flower .petal.p3 { transform: translateX(-50%) rotate(90deg) translateY(-16px) scale(0.2); }
    .flower .petal.p4 { transform: translateX(-50%) rotate(135deg) translateY(-16px) scale(0.2); }
    .flower .petal.p5 { transform: translateX(-50%) rotate(180deg) translateY(-16px) scale(0.2); }
    .flower .petal.p6 { transform: translateX(-50%) rotate(225deg) translateY(-16px) scale(0.2); }
    .flower .petal.p7 { transform: translateX(-50%) rotate(270deg) translateY(-16px) scale(0.2); }
    .flower .petal.p8 { transform: translateX(-50%) rotate(315deg) translateY(-16px) scale(0.2); }

    @keyframes growStem {
      from { height: 0; }
      to { height: 165px; }
    }

    @keyframes bloom {
      from { transform: translateX(-50%) scale(0); opacity: 0; }
      to { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    @keyframes petalIn {
      from { opacity: 0; }
      to { opacity: 1; transform: translateX(-50%) rotate(var(--rot)) translateY(-16px) scale(1); }
    }

    @keyframes leafIn {
      from { opacity: 0; transform: translateY(12px) scale(0.4) rotate(-20deg); }
      to { opacity: 1; }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%, -14px) scale(1.2); }
    }

    .code-card {
      position: absolute;
      width: 180px;
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      animation: floatCard 6s ease-in-out infinite;
      overflow: hidden;
    }

    .code-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.07), transparent);
      transform: translateX(-100%);
      animation: sweep 4.5s linear infinite;
    }

    .card1 {
      top: 190px;
      left: 16px;
      transform: rotate(-7deg);
    }

    .card2 {
      top: 270px;
      right: 16px;
      transform: rotate(7deg);
      animation-delay: 1.2s;
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.38);
    }

    .line {
      height: 8px;
      border-radius: 999px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,255,255,0.15));
      opacity: 0.88;
    }

    .line.small { width: 48%; }
    .line.mid { width: 70%; }
    .line.full { width: 100%; }

    @keyframes floatCard {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -10px; }
    }

    @keyframes sweep {
      100% { transform: translateX(100%); }
    }

    .hint {
      position: absolute;
      bottom: 138px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 12px;
      color: #f1dcff;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 14px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      animation: pulseHint 2.4s ease-in-out infinite;
    }

    @keyframes pulseHint {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.04); }
    }

    .bottombar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 18px 20px;
      z-index: 6;
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,0.32) 20%, rgba(0,0,0,0.68));
    }

    .userrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background:
        linear-gradient(135deg, var(--pink), var(--violet));
      box-shadow: 0 0 18px rgba(255,92,200,0.35);
      position: relative;
      overflow: hidden;
    }

    .avatar::before {
      content: "✿";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: white;
    }

    .uname {
      font-size: 14px;
      font-weight: 700;
    }

    .utag {
      font-size: 12px;
      color: #d5c7f5;
      margin-top: 2px;
    }

    .follow {
      padding: 10px 15px;
      border-radius: 999px;
      border: none;
      color: white;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--pink), var(--violet));
      box-shadow:
        0 10px 22px rgba(141, 92, 255, 0.28),
        0 0 24px rgba(255, 92, 200, 0.2);
      transition: 0.25s;
    }

    .follow:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .desc {
      font-size: 13px;
      color: #f4ebff;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .left-actions, .right-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      min-width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      font-size: 18px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .icon-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.12);
    }

    .counter {
      font-size: 12px;
      color: #eadcff;
      margin-left: -2px;
      margin-right: 4px;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      pointer-events: none;
      animation: particleFloat linear forwards;
      filter: blur(0.5px);
    }

    @keyframes particleFloat {
      from {
        opacity: 0;
        transform: translateY(0) scale(0.4);
      }
      15% {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translateY(-120px) translateX(var(--drift)) scale(1.4);
      }
    }

    @media (max-width: 430px) {
      .wrap {
        padding: 0;
      }

      .phone {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .title {
        font-size: 31px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="blob one"></div>
    <div class="blob two"></div>
    <div class="blob three"></div>
  </div>

  <div class="mouse-glow" id="mouseGlow"></div>

  <div class="wrap">
    <div class="phone" id="phone">
      <div class="scene" id="scene">
        <div class="grid-light"></div>

        <div class="topbar">
          <div class="pill">LIVE PREVIEW</div>
          <div class="pill">✨ Premium Motion</div>
        </div>

        <div class="title-box">
          <div class="title">Interactive<br>Flowers</div>
          <div class="subtitle">Tap anywhere to grow magical flowers</div>
        </div>

        <div class="code-card card1">
          <div class="dots"><span></span><span></span><span></span></div>
          <div class="line full"></div>
          <div class="line mid"></div>
          <div class="line full"></div>
          <div class="line small"></div>
        </div>

        <div class="code-card card2">
          <div class="dots"><span></span><span></span><span></span></div>
          <div class="line mid"></div>
          <div class="line full"></div>
          <div class="line small"></div>
          <div class="line mid"></div>
        </div>

        <div class="flower-field" id="flowerField"></div>

        <div class="hint">Tap to create flowers 🌸</div>
      </div>

      <div class="bottombar">
        <div class="userrow">
          <div class="user">
            <div class="avatar"></div>
            <div>
              <div class="uname">@yourusername</div>
              <div class="utag">Creative UI animation demo</div>
            </div>
          </div>
          <button class="follow">Follow</button>
        </div>

        <div class="desc">
          Beautiful glowing flower animation with premium dark UI, glassmorphism,
          floating code cards, and interactive bloom effect.
        </div>

        <div class="actions">
          <div class="left-actions">
            <div class="icon-btn" id="likeBtn">❤</div>
            <div class="counter" id="likeCount">24.8K</div>

            <div class="icon-btn">💬</div>
            <div class="counter">1.2K</div>

            <div class="icon-btn">↗</div>
            <div class="counter">Share</div>
          </div>

          <div class="right-actions">
            <div class="icon-btn">🔖</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const flowerField = document.getElementById("flowerField");
    const scene = document.getElementById("scene");
    const mouseGlow = document.getElementById("mouseGlow");
    const phone = document.getElementById("phone");
    const likeBtn = document.getElementById("likeBtn");
    const likeCount = document.getElementById("likeCount");

    let liked = false;
    let likes = 24800;

    function formatLikes(num) {
      if (num >= 1000) return (num / 1000).toFixed(1).replace(".0", "") + "K";
      return num.toString();
    }

    likeBtn.addEventListener("click", () => {
      liked = !liked;
      likes += liked ? 1 : -1;
      likeBtn.style.transform = "scale(1.15)";
      likeBtn.style.background = liked
        ? "linear-gradient(135deg, rgba(255,92,200,0.28), rgba(141,92,255,0.25))"
        : "rgba(255,255,255,0.07)";
      likeBtn.style.boxShadow = liked
        ? "0 0 25px rgba(255,92,200,0.35)"
        : "";
      likeBtn.textContent = liked ? "💖" : "❤";
      likeCount.textContent = formatLikes(likes);
      setTimeout(() => {
        likeBtn.style.transform = "";
      }, 180);
    });

    document.addEventListener("mousemove", (e) => {
      mouseGlow.style.left = e.clientX + "px";
      mouseGlow.style.top = e.clientY + "px";
    });

    document.addEventListener("touchmove", (e) => {
      if (e.touches[0]) {
        mouseGlow.style.left = e.touches[0].clientX + "px";
        mouseGlow.style.top = e.touches[0].clientY + "px";
      }
    }, { passive: true });

    function createFlower(xPercent, scale = 1, delay = 0) {
      const flower = document.createElement("div");
      flower.className = "flower";
      flower.style.left = `${xPercent}%`;
      flower.style.transform += ` scale(${scale})`;
      flower.style.animationDelay = `${delay}s`;
      flower.style.animationDuration = `${4 + Math.random() * 3}s`;

      flower.innerHTML = `
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="petal p1" style="--rot: 0deg;"></div>
        <div class="petal p2" style="--rot: 45deg;"></div>
        <div class="petal p3" style="--rot: 90deg;"></div>
        <div class="petal p4" style="--rot: 135deg;"></div>
        <div class="petal p5" style="--rot: 180deg;"></div>
        <div class="petal p6" style="--rot: 225deg;"></div>
        <div class="petal p7" style="--rot: 270deg;"></div>
        <div class="petal p8" style="--rot: 315deg;"></div>
        <div class="center"></div>
        <div class="spark"></div>
      `;

      flowerField.appendChild(flower);

      setTimeout(() => {
        if (flowerField.children.length > 18) {
          flowerField.removeChild(flowerField.children[0]);
        }
      }, 9000);
    }

    function spawnParticle(x, y) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = x + "px";
      p.style.top = y + "px";
      p.style.setProperty("--drift", `${(Math.random() - 0.5) * 80}px`);
      p.style.animationDuration = `${1.8 + Math.random() * 1.5}s`;
      scene.appendChild(p);

      setTimeout(() => p.remove(), 3200);
    }

    function bloomAt(clientX, clientY) {
      const rect = flowerField.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width) * 100;

      if (x < 2 || x > 98) return;

      createFlower(x, 0.9 + Math.random() * 0.4);

      for (let i = 0; i < 10; i++) {
        spawnParticle(clientX + (Math.random() - 0.5) * 40, clientY + (Math.random() - 0.5) * 20);
      }
    }

    phone.addEventListener("click", (e) => {
      const bottomLimit = window.innerHeight - 220;
      if (e.clientY < bottomLimit) {
        bloomAt(e.clientX, e.clientY);
      }
    });

    phone.addEventListener("touchstart", (e) => {
      const t = e.touches[0];
      if (!t) return;
      const bottomLimit = window.innerHeight - 220;
      if (t.clientY < bottomLimit) {
        bloomAt(t.clientX, t.clientY);
      }
    }, { passive: true });

    // Initial flowers
    const initialFlowers = [
      [14, 0.92, 0],
      [27, 1.05, 0.15],
      [41, 0.88, 0.25],
      [56, 1.12, 0.35],
      [71, 0.96, 0.45],
      [84, 1.06, 0.2]
    ];

    initialFlowers.forEach(([x, scale, delay]) => createFlower(x, scale, delay));

    // Auto particles
    setInterval(() => {
      const rect = phone.getBoundingClientRect();
      const x = rect.left + 70 + Math.random() * (rect.width - 140);
      const y = rect.top + 260 + Math.random() * 240;
      spawnParticle(x, y);
    }, 500);
  </script>
</body>
</html>
